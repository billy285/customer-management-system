<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理系统 - 任务管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans min-h-screen">
    <main class="max-w-3xl mx-auto p-6">
        <div class="bg-white rounded-lg shadow-sm p-8 mt-10">
            <div class="flex items-center mb-4">
                <i class="fa fa-tasks text-orange-600 text-2xl mr-3"></i>
                <h1 class="text-2xl font-bold text-gray-800">任务管理</h1>
            </div>
            <p class="text-gray-600 mb-6">该页面已补齐，避免导航链接 404。后续可在这里继续扩展任务分配、截止时间和进度追踪。</p>
            <a href="dashboard.html" class="inline-flex items-center px-4 py-2 bg-blue-700 text-white rounded hover:bg-blue-800">
                <i class="fa fa-arrow-left mr-2"></i>返回仪表盘
            </a>
        </div>
    </main>
    <script>
        const savedLogin = localStorage.getItem('userLogin') || sessionStorage.getItem('userLogin');
        if (!savedLogin) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
