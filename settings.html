<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理系统 - 系统设置</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#3b82f6',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        light: '#f3f4f6',
                        dark: '#1f2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bg-gradient-primary {
                background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            }
            .card-shadow {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
            .transition-all-300 {
                transition: all 0.3s ease;
            }
            .sidebar-active {
                border-left: 4px solid #1e40af;
                background-color: rgba(30, 64, 175, 0.1);
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="bg-white w-64 shadow-lg hidden md:block transition-all-300">
            <div class="p-4 border-b">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-gradient-primary flex items-center justify-center text-white">
                        <i class="fa fa-users"></i>
                    </div>
                    <h1 class="ml-3 text-lg font-bold text-gray-800">客户管理系统</h1>
                </div>
            </div>
            
            <div class="py-4">
                <div class="px-4 py-2 text-xs text-gray-600 uppercase tracking-wider">
                    主菜单
                </div>
                <nav>
                    <a href="dashboard.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-dashboard w-6 text-gray-500"></i>
                        <span>仪表盘</span>
                    </a>
                    <a href="customers.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-user-circle w-6 text-gray-500"></i>
                        <span>客户管理</span>
                    </a>
                    <a href="sales.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-handshake-o w-6 text-gray-500"></i>
                        <span>销售管理</span>
                    </a>
                    <a href="delivery.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-tasks w-6 text-gray-500"></i>
                        <span>交付管理</span>
                    </a>
                    <a href="renewal.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-refresh w-6 text-gray-500"></i>
                        <span>续费管理</span>
                    </a>
                    <a href="finance.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-money w-6 text-gray-500"></i>
                        <span>财务管理</span>
                    </a>
                    <a href="tasks.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-calendar-check-o w-6 text-gray-500"></i>
                        <span>任务协作</span>
                    </a>
                    <a href="reports.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-bar-chart w-6 text-gray-500"></i>
                        <span>报表中心</span>
                    </a>
                </nav>
                
                <div class="px-4 py-2 mt-4 text-xs text-gray-600 uppercase tracking-wider">
                    系统
                </div>
                <nav>
                    <a href="settings.html" class="flex items-center px-4 py-3 text-gray-700 sidebar-active">
                        <i class="fa fa-cog w-6 text-gray-500"></i>
                        <span>系统设置</span>
                    </a>
                    <a href="#" id="logout-btn" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-sign-out w-6 text-gray-500"></i>
                        <span>退出登录</span>
                    </a>
                </nav>
            </div>
        </aside>
        
        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Navigation -->
            <header class="bg-white shadow-sm z-10">
                <div class="flex items-center justify-between p-4">
                    <div class="flex items-center">
                        <button id="sidebar-toggle" class="text-gray-500 focus:outline-none md:hidden">
                            <i class="fa fa-bars text-xl"></i>
                        </button>
                        <h2 class="ml-2 text-xl font-semibold text-gray-800">系统设置</h2>
                    </div>
                    
                    <div class="flex items-center">
                        <div class="relative mr-4">
                            <button class="text-gray-500 focus:outline-none">
                                <i class="fa fa-bell text-xl"></i>
                                <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
                            </button>
                        </div>
                        
                        <div class="relative">
                            <button id="user-menu-button" class="flex items-center text-gray-700 focus:outline-none">
                                <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center">
                                    <span id="user-initial">管</span>
                                </div>
                                <span class="ml-2 text-sm font-medium" id="user-name">管理员</span>
                                <i class="fa fa-chevron-down ml-1 text-xs"></i>
                            </button>
                            
                            <div id="user-menu" class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 hidden">
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <i class="fa fa-user mr-2"></i> 个人资料
                                </a>
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <i class="fa fa-cog mr-2"></i> 账户设置
                                </a>
                                <div class="border-t border-gray-200"></div>
                                <a href="#" id="user-menu-logout" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <i class="fa fa-sign-out mr-2"></i> 退出登录
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Settings Tabs -->
                <div class="border-b border-gray-200">
                    <nav class="flex -mb-px">
                        <a href="#" class="settings-tab-active border-primary text-primary whitespace-nowrap py-4 px-6 border-b-2 font-medium text-sm">
                            个人资料
                        </a>
                        <a href="#" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-6 border-b-2 font-medium text-sm">
                            账户安全
                        </a>
                        <a href="#" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-6 border-b-2 font-medium text-sm">
                            通知设置
                        </a>
                        <a href="#" class="border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-6 border-b-2 font-medium text-sm">
                            系统配置
                        </a>
                    </nav>
                </div>
            </header>
            
            <!-- Main Content Area -->
            <main class="flex-1 overflow-y-auto p-4 bg-gray-100">
                <!-- Personal Profile Section -->
                <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">个人资料</h3>
                    
                    <form id="profile-form">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">姓名 <span class="text-red-500">*</span></label>
                                <input type="text" id="name" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" value="管理员" required>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">用户名 <span class="text-red-500">*</span></label>
                                <input type="text" id="username" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" value="admin" required>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                                <input type="email" id="email" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" value="admin@example.com">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">电话</label>
                                <input type="tel" id="phone" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" value="+1 (212) 555-1234">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">部门</label>
                                <select id="department" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                    <option value="management" selected>管理层</option>
                                    <option value="sales">销售部</option>
                                    <option value="operation">运营部</option>
                                    <option value="design">设计部</option>
                                    <option value="finance">财务部</option>
                                    <option value="hr">人事部</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">职位</label>
                                <input type="text" id="position" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" value="系统管理员">
                            </div>
                            
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                                <textarea id="notes" rows="3" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">系统管理员，拥有所有权限</textarea>
                            </div>
                        </div>
                        
                        <div class="mt-6 flex justify-end">
                            <button type="submit" class="bg-primary hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-all-300">
                                保存更改
                            </button>
                        </div>
                    </form>
                </div>
                
                <!-- Profile Picture Section -->
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">个人头像</h3>
                    
                    <div class="flex flex-col md:flex-row items-center">
                        <div class="mb-4 md:mb-0 md:mr-6">
                            <div class="w-32 h-32 rounded-full bg-gray-300 flex items-center justify-center overflow-hidden border-4 border-white shadow">
                                <span class="text-4xl font-bold text-gray-500" id="avatar-initial">管</span>
                            </div>
                        </div>
                        
                        <div class="flex-1">
                            <p class="text-sm text-gray-600 mb-4">上传您的个人头像，建议使用清晰的照片，尺寸为 200x200 像素。</p>
                            
                            <div class="flex items-center">
                                <button id="upload-avatar-btn" class="bg-white border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-md hover:bg-gray-50 transition-all-300 flex items-center mr-3">
                                    <i class="fa fa-upload mr-2"></i> 上传头像
                                </button>
                                <button id="remove-avatar-btn" class="bg-white border border-red-300 text-red-600 font-medium py-2 px-4 rounded-md hover:bg-gray-50 transition-all-300 flex items-center">
                                    <i class="fa fa-trash mr-2"></i> 删除头像
                                </button>
                            </div>
                            
                            <input type="file" id="avatar-upload" class="hidden" accept="image/*">
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // 检查登录状态
        document.addEventListener('DOMContentLoaded', function() {
            const savedLogin = localStorage.getItem('userLogin') || sessionStorage.getItem('userLogin');
            
            if (!savedLogin) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                const userData = JSON.parse(savedLogin);
                
                // 更新用户信息
                document.getElementById('user-name').textContent = userData.name;
                document.getElementById('user-initial').textContent = userData.name.charAt(0);
                document.getElementById('avatar-initial').textContent = userData.name.charAt(0);
                
                // 填充个人资料表单
                document.getElementById('name').value = userData.name;
                document.getElementById('username').value = userData.userId;
                
            } catch (e) {
                console.error('登录信息解析错误', e);
                window.location.href = 'index.html';
            }
        });
        
        // 侧边栏切换
        document.getElementById('sidebar-toggle').addEventListener('click', function() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
        });
        
        // 用户菜单切换
        document.getElementById('user-menu-button').addEventListener('click', function() {
            const userMenu = document.getElementById('user-menu');
            userMenu.classList.toggle('hidden');
        });
        
        // 点击其他地方关闭用户菜单
        document.addEventListener('click', function(event) {
            const userMenu = document.getElementById('user-menu');
            const userMenuButton = document.getElementById('user-menu-button');
            
            if (!userMenuButton.contains(event.target) && !userMenu.contains(event.target)) {
                userMenu.classList.add('hidden');
            }
        });
        
        // 个人资料表单提交
        document.getElementById('profile-form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // 获取表单数据
            const name = document.getElementById('name').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const department = document.getElementById('department').value;
            const position = document.getElementById('position').value;
            const notes = document.getElementById('notes').value;
            
            // 更新用户信息
            const savedLogin = localStorage.getItem('userLogin') || sessionStorage.getItem('userLogin');
            if (savedLogin) {
                const userData = JSON.parse(savedLogin);
                userData.name = name;
                
                if (localStorage.getItem('userLogin')) {
                    localStorage.setItem('userLogin', JSON.stringify(userData));
                } else {
                    sessionStorage.setItem('userLogin', JSON.stringify(userData));
                }
                
                // 更新界面显示
                document.getElementById('user-name').textContent = name;
                document.getElementById('user-initial').textContent = name.charAt(0);
                document.getElementById('avatar-initial').textContent = name.charAt(0);
            }
            
            // 显示成功消息
            alert('个人资料更新成功！');
        });
        
        // 头像上传
        document.getElementById('upload-avatar-btn').addEventListener('click', function() {
            document.getElementById('avatar-upload').click();
        });
        
        document.getElementById('avatar-upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                // 这里可以添加文件验证和上传逻辑
                alert('头像上传功能在实际应用中需要后端支持，这里仅作演示。');
            }
        });
        
        // 删除头像
        document.getElementById('remove-avatar-btn').addEventListener('click', function() {
            if (confirm('确定要删除头像吗？')) {
                // 这里可以添加删除头像的逻辑
                alert('头像删除功能在实际应用中需要后端支持，这里仅作演示。');
            }
        });
        
        // 退出登录
        document.getElementById('logout-btn').addEventListener('click', function(e) {
            e.preventDefault();
            logout();
        });
        
        document.getElementById('user-menu-logout').addEventListener('click', function(e) {
            e.preventDefault();
            logout();
        });
        
        function logout() {
            localStorage.removeItem('userLogin');
            sessionStorage.removeItem('userLogin');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
