<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理系统 - 客户管理</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#3b82f6',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        light: '#f3f4f6',
                        dark: '#1f2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bg-gradient-primary {
                background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            }
            .card-shadow {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
            .transition-all-300 {
                transition: all 0.3s ease;
            }
            .sidebar-active {
                border-left: 4px solid #1e40af;
                background-color: rgba(30, 64, 175, 0.1);
            }
            .status-badge {
                @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium;
            }
            .status-high {
                @apply bg-blue-100 text-blue-800;
            }
            .status-normal {
                @apply bg-green-100 text-green-800;
            }
            .status-low {
                @apply bg-yellow-100 text-yellow-800;
            }
            .status-vip {
                @apply bg-purple-100 text-purple-800;
            }
            .customer-status-unclosed {
                @apply bg-yellow-100 text-yellow-800;
            }
            .customer-status-following {
                @apply bg-blue-100 text-blue-800;
            }
            .customer-status-closed {
                @apply bg-green-100 text-green-800;
            }
            .customer-status-paused {
                @apply bg-gray-100 text-gray-800;
            }
            .customer-status-lost {
                @apply bg-red-100 text-red-800;
            }
        }
    </style>
    <script src="app-config.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="bg-white w-64 shadow-lg hidden md:block transition-all-300">
            <div class="p-4 border-b">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-gradient-primary flex items-center justify-center text-white">
                        <i class="fa fa-users"></i>
                    </div>
                    <h1 class="ml-3 text-lg font-bold text-gray-800">客户管理系统</h1>
                </div>
            </div>
            
            <div class="py-4">
                <div class="px-4 py-2 text-xs text-gray-600 uppercase tracking-wider">
                    主菜单
                </div>
                <nav>
                    <a href="dashboard.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-dashboard w-6 text-gray-500"></i>
                        <span>仪表盘</span>
                    </a>
                    <a href="customers.html" class="flex items-center px-4 py-3 text-gray-700 sidebar-active">
                        <i class="fa fa-user-circle w-6 text-gray-500"></i>
                        <span>客户管理</span>
                    </a>
                    <a href="sales.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-handshake-o w-6 text-gray-500"></i>
                        <span>销售管理</span>
                    </a>
                    <a href="delivery.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-tasks w-6 text-gray-500"></i>
                        <span>交付管理</span>
                    </a>
                    <a href="renewal.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-refresh w-6 text-gray-500"></i>
                        <span>续费管理</span>
                    </a>
                    <a href="finance.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-money w-6 text-gray-500"></i>
                        <span>财务管理</span>
                    </a>
                    <a href="tasks.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-calendar-check-o w-6 text-gray-500"></i>
                        <span>任务协作</span>
                    </a>
                    <a href="reports.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-bar-chart w-6 text-gray-500"></i>
                        <span>报表中心</span>
                    </a>
                </nav>
                
                <div class="px-4 py-2 mt-4 text-xs text-gray-600 uppercase tracking-wider">
                    系统
                </div>
                <nav>
                    <a href="settings.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-cog w-6 text-gray-500"></i>
                        <span>系统设置</span>
                    </a>
                    <a href="#" id="logout-btn" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300">
                        <i class="fa fa-sign-out w-6 text-gray-500"></i>
                        <span>退出登录</span>
                    </a>
                </nav>
            </div>
        </aside>
        
        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Navigation -->
            <header class="bg-white shadow-sm z-10">
                <div class="flex items-center justify-between p-4">
                    <div class="flex items-center">
                        <button id="sidebar-toggle" class="text-gray-500 focus:outline-none md:hidden">
                            <i class="fa fa-bars text-xl"></i>
                        </button>
                        <h2 class="ml-2 text-xl font-semibold text-gray-800">客户管理</h2>
                    </div>
                    
                    <div class="flex items-center">
                        <div class="relative mr-4">
                            <button class="text-gray-500 focus:outline-none">
                                <i class="fa fa-bell text-xl"></i>
                                <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
                            </button>
                        </div>
                        
                        <div class="relative">
                            <button id="user-menu-button" class="flex items-center text-gray-700 focus:outline-none">
                                <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center">
                                    <span id="user-initial">管</span>
                                </div>
                                <span class="ml-2 text-sm font-medium" id="user-name">管理员</span>
                                <i class="fa fa-chevron-down ml-1 text-xs"></i>
                            </button>
                            
                            <div id="user-menu" class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 hidden">
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <i class="fa fa-user mr-2"></i> 个人资料
                                </a>
                                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <i class="fa fa-cog mr-2"></i> 账户设置
                                </a>
                                <div class="border-t border-gray-200"></div>
                                <a href="#" id="user-menu-logout" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                    <i class="fa fa-sign-out mr-2"></i> 退出登录
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- Main Content Area -->
            <main class="flex-1 overflow-y-auto p-4 bg-gray-100">
                <!-- Action Bar -->
                <div class="bg-white rounded-lg shadow-sm p-4 mb-6">
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between">
                        <div class="flex items-center mb-4 md:mb-0">
                            <button id="add-customer-btn" class="bg-primary hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-all-300 flex items-center">
                                <i class="fa fa-plus mr-2"></i> 添加客户
                            </button>
                            <div class="ml-3 relative">
                                <button id="batch-actions-btn" class="bg-white border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-md hover:bg-gray-50 transition-all-300 flex items-center">
                                    <i class="fa fa-cog mr-2"></i> 批量操作
                                    <i class="fa fa-chevron-down ml-2 text-xs"></i>
                                </button>
                                <div id="batch-actions-menu" class="absolute left-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 hidden z-10">
                                    <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                        <i class="fa fa-download mr-2"></i> 导出选中
                                    </a>
                                    <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                        <i class="fa fa-print mr-2"></i> 打印选中
                                    </a>
                                    <div class="border-t border-gray-200"></div>
                                    <a href="#" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">
                                        <i class="fa fa-trash mr-2"></i> 删除选中
                                    </a>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex items-center">
                            <div class="relative">
                                <input type="text" id="search-input" placeholder="搜索客户名称、联系人..." class="w-full md:w-64 pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa fa-search text-gray-400"></i>
                                </div>
                            </div>
                            <button id="filter-btn" class="ml-3 bg-white border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-md hover:bg-gray-50 transition-all-300 flex items-center">
                                <i class="fa fa-filter mr-2"></i> 筛选
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Filter Panel (Hidden by default) -->
                <div id="filter-panel" class="bg-white rounded-lg shadow-sm p-4 mb-6 hidden">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">客户状态</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="">全部状态</option>
                                <option value="unclosed">未成交</option>
                                <option value="following">跟进中</option>
                                <option value="closed">已成交</option>
                                <option value="paused">暂停</option>
                                <option value="lost">流失</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">负责人</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="">全部负责人</option>
                                <option value="1">张三</option>
                                <option value="2">李四</option>
                                <option value="3">王五</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">行业类型</label>
                            <select id="industry-filter-select" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="">全部行业</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">客户等级</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="">全部等级</option>
                                <option value="high">高意向</option>
                                <option value="normal">普通</option>
                                <option value="low">低意向</option>
                                <option value="vip">VIP</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">城市</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="">全部城市</option>
                                <option value="ny">纽约</option>
                                <option value="la">洛杉矶</option>
                                <option value="sf">旧金山</option>
                                <option value="chicago">芝加哥</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">创建时间</label>
                            <div class="flex items-center space-x-2">
                                <input type="date" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <span>至</span>
                                <input type="date" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-4 flex justify-end space-x-3">
                        <button class="bg-white border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-md hover:bg-gray-50 transition-all-300">
                            重置
                        </button>
                        <button class="bg-primary hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-all-300">
                            应用筛选
                        </button>
                    </div>
                </div>
                
                <!-- Customer List -->
                <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        <div class="flex items-center">
                                            <input id="select-all" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                                        </div>
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        客户编号
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        商家名称
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        联系人
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        电话
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        行业
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        负责人
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        等级
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        状态
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        创建时间
                                    </th>
                                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        操作
                                    </th>
                                </tr>
                            </thead>
                            <tbody class="bg-white divide-y divide-gray-200" id="customer-table-body">
                                <!-- Customer rows will be inserted here by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Pagination -->
                    <div class="bg-white px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6">
                        <div class="flex-1 flex justify-between sm:hidden">
                            <a href="#" class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                                上一页
                            </a>
                            <a href="#" class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                                下一页
                            </a>
                        </div>
                        <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                            <div>
                                <p class="text-sm text-gray-700">
                                    显示 <span class="font-medium">1</span> 到 <span class="font-medium">10</span> 条，共 <span class="font-medium">42</span> 条记录
                                </p>
                            </div>
                            <div>
                                <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                                    <a href="#" class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                        <span class="sr-only">上一页</span>
                                        <i class="fa fa-chevron-left"></i>
                                    </a>
                                    <a href="#" aria-current="page" class="z-10 bg-primary border-primary text-white relative inline-flex items-center px-4 py-2 border text-sm font-medium">
                                        1
                                    </a>
                                    <a href="#" class="bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium">
                                        2
                                    </a>
                                    <a href="#" class="bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium">
                                        3
                                    </a>
                                    <span class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700">
                                        ...
                                    </span>
                                    <a href="#" class="bg-white border-gray-300 text-gray-500 hover:bg-gray-50 relative inline-flex items-center px-4 py-2 border text-sm font-medium">
                                        5
                                    </a>
                                    <a href="#" class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50">
                                        <span class="sr-only">下一页</span>
                                        <i class="fa fa-chevron-right"></i>
                                    </a>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Add Customer Modal (Hidden by default) -->
    <div id="add-customer-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between p-6 border-b">
                <h3 class="text-lg font-semibold text-gray-800">添加新客户</h3>
                <button id="close-modal-btn" class="text-gray-400 hover:text-gray-500 focus:outline-none">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            
            <div class="p-6">
                <form id="add-customer-form">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">商家名称 <span class="text-red-500">*</span></label>
                            <input id="new-customer-business" type="text" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">联系人 <span class="text-red-500">*</span></label>
                            <input id="new-customer-contact" type="text" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">联系电话 <span class="text-red-500">*</span></label>
                            <input id="new-customer-phone" type="tel" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">微信/WhatsApp</label>
                            <input type="text" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                            <input type="email" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">行业类型 <span class="text-red-500">*</span></label>
                            <select id="new-customer-industry" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                                <option value="">请选择行业</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">商家地址</label>
                            <input type="text" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">城市</label>
                            <input type="text" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">州</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="">请选择州</option>
                                <option value="NY">纽约州 (NY)</option>
                                <option value="CA">加利福尼亚州 (CA)</option>
                                <option value="IL">伊利诺伊州 (IL)</option>
                                <option value="TX">德克萨斯州 (TX)</option>
                                <option value="FL">佛罗里达州 (FL)</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">客户来源</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="">请选择来源</option>
                                <option value="call">电话销售</option>
                                <option value="referral">转介绍</option>
                                <option value="ad">广告</option>
                                <option value="private">私域</option>
                                <option value="old">老客户</option>
                                <option value="other">其他</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">负责人</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="">请选择负责人</option>
                                <option value="1">张三</option>
                                <option value="2">李四</option>
                                <option value="3">王五</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">客户等级</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="normal">普通</option>
                                <option value="high">高意向</option>
                                <option value="low">低意向</option>
                                <option value="vip">VIP</option>
                            </select>
                        </div>
                        
                        <div>

                            <div class="flex items-center space-x-4">
                                <label class="inline-flex items-center">
                                    <input type="radio" name="hasOrderingSystem" value="true" class="h-4 w-4 text-primary focus:ring-primary border-gray-300">
                                    <span class="ml-2 text-sm text-gray-700">是</span>
                                </label>
                                <label class="inline-flex items-center">
                                    <input type="radio" name="hasOrderingSystem" value="false" checked class="h-4 w-4 text-primary focus:ring-primary border-gray-300">
                                    <span class="ml-2 text-sm text-gray-700">否</span>
                                </label>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">当前使用的平台</label>
                            <select class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                <option value="">请选择平台</option>
                                <option value="beyondmenu">BeyondMenu</option>
                                <option value="menusifu">MenuSifu</option>
                                <option value="qmenu">QMenu</option>
                                <option value="honorpos">HonorPOS</option>
                                <option value="custom">自建站</option>
                                <option value="none">无</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">月订单量（可填写预估）</label>
                            <input type="number" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">商家官网</label>
                            <input type="url" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Google Business 链接</label>
                            <input type="url" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Facebook 链接</label>
                            <input type="url" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Instagram 链接</label>
                            <input type="url" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Yelp 链接</label>
                            <input type="url" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                            <textarea rows="3" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"></textarea>
                        </div>
                    </div>
                    
                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" id="cancel-add-customer" class="bg-white border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-md hover:bg-gray-50 transition-all-300">
                            取消
                        </button>
                        <button type="submit" class="bg-primary hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-all-300">
                            保存客户

    </div>

    <!-- Customer Detail/Edit Modal -->
    <div id="customer-detail-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl">
            <div class="flex items-center justify-between p-6 border-b">
                <h3 id="customer-detail-title" class="text-lg font-semibold text-gray-800">客户详情</h3>
                <button id="close-detail-modal-btn" class="text-gray-400 hover:text-gray-500 focus:outline-none">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="customer-detail-form">
                    <input type="hidden" id="detail-customer-id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">商家名称</label>
                            <input id="detail-business-name" class="w-full border border-gray-300 rounded-md px-3 py-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">联系人</label>
                            <input id="detail-contact-person" class="w-full border border-gray-300 rounded-md px-3 py-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">联系电话</label>
                            <input id="detail-phone" class="w-full border border-gray-300 rounded-md px-3 py-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">行业类型</label>
                            <select id="detail-industry" class="w-full border border-gray-300 rounded-md px-3 py-2"></select>
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" id="cancel-detail-modal" class="bg-white border border-gray-300 text-gray-700 font-medium py-2 px-4 rounded-md">关闭</button>
                        <button type="submit" id="save-detail-btn" class="bg-primary hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md">保存修改</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 检查登录状态
        document.addEventListener('DOMContentLoaded', function() {
            const savedLogin = localStorage.getItem('userLogin') || sessionStorage.getItem('userLogin');
            
            if (!savedLogin) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                const userData = JSON.parse(savedLogin);
                
                // 更新用户信息
                document.getElementById('user-name').textContent = userData.name;
                document.getElementById('user-initial').textContent = userData.name.charAt(0);
                
                CMSConfig.ensureDemoData();
                mockCustomers = normalizeCustomers(CMSConfig.getCustomers());
                // 加载行业配置和客户数据
                renderIndustryOptions();
                loadCustomers();
                
            } catch (e) {
                console.error('登录信息解析错误', e);
                window.location.href = 'index.html';
            }
        });
        
        // 模拟客户数据
        function getIndustryConfig() {
            return CMSConfig.getActiveProfile();
        }

        function getIndustryMap(config) {
            return (config.industries || []).reduce((map, industry) => {
                map[industry.value] = industry.label;
                return map;
            }, {});
        }

        function renderIndustryOptions() {
            const config = getIndustryConfig();
            const filterSelect = document.getElementById('industry-filter-select');
            const addSelect = document.getElementById('new-customer-industry');

            filterSelect.innerHTML = '<option value="">全部行业</option>';
            addSelect.innerHTML = '<option value="">请选择行业</option>';

            config.industries.forEach((industry) => {
                const filterOption = document.createElement('option');
                filterOption.value = industry.value;
                filterOption.textContent = industry.label;
                filterSelect.appendChild(filterOption);

                const addOption = document.createElement('option');
                addOption.value = industry.value;
                addOption.textContent = industry.label;
                addSelect.appendChild(addOption);
            });
        }

        let mockCustomers = normalizeCustomers(CMSConfig.getCustomers());
        if (!mockCustomers.length) {
            CMSConfig.ensureDemoData();
            mockCustomers = normalizeCustomers(CMSConfig.getCustomers());
        }
        

        function normalizeCustomers(rows) {
            return (rows || []).map((row, index) => ({
                id: String(row.id || index + 1),
                customerNumber: row.customerNumber || row.customerNo || `C2026${String(index + 1).padStart(4, '0')}`,
                businessName: row.businessName || row.customerName || row.name || '',
                contactPerson: row.contactPerson || row.contact || row.owner || '',
                phone: row.phone || row.mobile || row.tel || '',
                industry: row.industry || row.industryType || 'other',
                salesPerson: row.salesPerson || row.owner || '未分配',
                level: row.level || 'normal',
                status: row.status || 'following',
                createdAt: row.createdAt || row.createTime || new Date().toISOString().slice(0, 10)
            }));
        }

        // 加载客户数据
        function loadCustomers() {
            const tableBody = document.getElementById('customer-table-body');
            tableBody.innerHTML = '';
            mockCustomers = normalizeCustomers(mockCustomers);
            
            const industryMap = getIndustryMap(getIndustryConfig());

            mockCustomers.forEach(customer => {
                const row = document.createElement('tr');
                
                // 等级映射
                const levelMap = {
                    'high': '高意向',
                    'normal': '普通',
                    'low': '低意向',
                    'vip': 'VIP'
                };
                
                // 状态映射
                const statusMap = {
                    'unclosed': '未成交',
                    'following': '跟进中',
                    'closed': '已成交',
                    'paused': '暂停',
                    'lost': '流失'
                };
                
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <input type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${customer.customerNumber}</div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-sm text-gray-900 font-medium">${customer.businessName}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${customer.contactPerson}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${customer.phone}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${industryMap[customer.industry] || customer.industry}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm text-gray-900">${customer.salesPerson}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="status-badge status-${customer.level}">${levelMap[customer.level] || customer.level}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="status-badge customer-status-${customer.status}">${statusMap[customer.status] || customer.status}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${customer.createdAt}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button data-action="view" data-id="${customer.id}" class="text-primary hover:text-secondary mr-3">查看</button>
                        <button data-action="edit" data-id="${customer.id}" class="text-gray-600 hover:text-gray-900 mr-3">编辑</button>
                        <button data-action="delete" data-id="${customer.id}" class="text-red-600 hover:text-red-900">删除</button>
                    </td>
                `;
                
                tableBody.appendChild(row);
            });
        }
        
        // 侧边栏切换
        document.getElementById('sidebar-toggle').addEventListener('click', function() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
        });
        
        // 用户菜单切换
        document.getElementById('user-menu-button').addEventListener('click', function() {
            const userMenu = document.getElementById('user-menu');
            userMenu.classList.toggle('hidden');
        });
        
        // 点击其他地方关闭用户菜单
        document.addEventListener('click', function(event) {
            const userMenu = document.getElementById('user-menu');
            const userMenuButton = document.getElementById('user-menu-button');
            
            if (!userMenuButton.contains(event.target) && !userMenu.contains(event.target)) {
                userMenu.classList.add('hidden');
            }
        });
        
        // 批量操作菜单切换
        document.getElementById('batch-actions-btn').addEventListener('click', function() {
            const batchActionsMenu = document.getElementById('batch-actions-menu');
            batchActionsMenu.classList.toggle('hidden');
        });
        
        // 点击其他地方关闭批量操作菜单
        document.addEventListener('click', function(event) {
            const batchActionsMenu = document.getElementById('batch-actions-menu');
            const batchActionsButton = document.getElementById('batch-actions-btn');
            
            if (!batchActionsButton.contains(event.target) && !batchActionsMenu.contains(event.target)) {
                batchActionsMenu.classList.add('hidden');
            }
        });
        
        // 筛选面板切换
        document.getElementById('filter-btn').addEventListener('click', function() {
            const filterPanel = document.getElementById('filter-panel');
            filterPanel.classList.toggle('hidden');
        });
        
        // 添加客户模态框
        document.getElementById('add-customer-btn').addEventListener('click', function() {
            const modal = document.getElementById('add-customer-modal');
            modal.classList.remove('hidden');
        });
        
        document.getElementById('close-modal-btn').addEventListener('click', function() {
            const modal = document.getElementById('add-customer-modal');
            modal.classList.add('hidden');
        });
        
        document.getElementById('cancel-add-customer').addEventListener('click', function() {
            const modal = document.getElementById('add-customer-modal');
            modal.classList.add('hidden');
        });
        
        // 点击模态框外部关闭
        document.getElementById('add-customer-modal').addEventListener('click', function(event) {
            if (event.target === this) {
                this.classList.add('hidden');
            }
        });
        
        // 添加客户表单提交
        document.getElementById('add-customer-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const businessName = document.getElementById('new-customer-business').value.trim();
            const contactPerson = document.getElementById('new-customer-contact').value.trim();
            const phone = document.getElementById('new-customer-phone').value.trim();
            const industry = document.getElementById('new-customer-industry').value;

            const nextId = String(mockCustomers.length + 1);
            const nextNumber = `C2026${String(mockCustomers.length + 1).padStart(4, '0')}`;

            mockCustomers.unshift({
                id: nextId,
                customerNumber: nextNumber,
                businessName,
                contactPerson,
                phone,
                industry,
                salesPerson: document.getElementById('user-name').textContent || '当前用户',
                level: 'normal',
                status: 'following',
                createdAt: new Date().toISOString().slice(0, 10)
            });

            CMSConfig.setCustomers(mockCustomers);
            loadCustomers();
            alert('客户添加成功！');

            document.getElementById('add-customer-modal').classList.add('hidden');
            this.reset();
            renderIndustryOptions();
        });
        
        // 全选/取消全选
        document.getElementById('select-all').addEventListener('change', function() {
            const checkboxes = document.querySelectorAll('tbody input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.checked = this.checked;
            });
        });
        

        function openCustomerDetailModal(customerId, mode) {
            const customer = mockCustomers.find((item) => item.id === customerId);
            if (!customer) {
                alert('未找到客户数据，请刷新后重试。');
                return;
            }
            const config = getIndustryConfig();
            const select = document.getElementById('detail-industry');
            select.innerHTML = '';
            (config.industries || []).forEach((industry) => {
                const option = document.createElement('option');
                option.value = industry.value;
                option.textContent = industry.label;
                select.appendChild(option);
            });

            document.getElementById('detail-customer-id').value = customer.id;
            document.getElementById('detail-business-name').value = customer.businessName;
            document.getElementById('detail-contact-person').value = customer.contactPerson;
            document.getElementById('detail-phone').value = customer.phone;
            document.getElementById('detail-industry').value = customer.industry;

            const readonly = mode === 'view';
            document.getElementById('customer-detail-title').textContent = readonly ? '客户详情' : '编辑客户';
            ['detail-business-name', 'detail-contact-person', 'detail-phone', 'detail-industry'].forEach((id) => {
                document.getElementById(id).disabled = readonly;
            });
            document.getElementById('save-detail-btn').classList.toggle('hidden', readonly);
            document.getElementById('customer-detail-modal').classList.remove('hidden');
        }

        function closeCustomerDetailModal() {
            document.getElementById('customer-detail-modal').classList.add('hidden');
        }

        document.getElementById('customer-table-body').addEventListener('click', function(event) {
            const actionButton = event.target.closest('button[data-action]');
            if (!actionButton) return;

            const customerId = actionButton.dataset.id;
            const action = actionButton.dataset.action;

            if (action === 'view') {
                openCustomerDetailModal(customerId, 'view');
                return;
            }
            if (action === 'edit') {
                openCustomerDetailModal(customerId, 'edit');
                return;
            }
            if (action === 'delete') {
                const target = mockCustomers.find((item) => item.id === customerId);
                if (!target) return;
                if (!confirm(`确定删除客户「${target.businessName}」吗？`)) return;
                mockCustomers = mockCustomers.filter((item) => item.id !== customerId);
                CMSConfig.setCustomers(mockCustomers);
                loadCustomers();
                alert('客户已删除。');
            }
        });

        document.getElementById('close-detail-modal-btn').addEventListener('click', closeCustomerDetailModal);
        document.getElementById('cancel-detail-modal').addEventListener('click', closeCustomerDetailModal);
        document.getElementById('customer-detail-modal').addEventListener('click', function(event) {
            if (event.target === this) closeCustomerDetailModal();
        });

        document.getElementById('customer-detail-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const customerId = document.getElementById('detail-customer-id').value;
            const index = mockCustomers.findIndex((item) => item.id === customerId);
            if (index === -1) return;

            mockCustomers[index] = {
                ...mockCustomers[index],
                businessName: document.getElementById('detail-business-name').value.trim(),
                contactPerson: document.getElementById('detail-contact-person').value.trim(),
                phone: document.getElementById('detail-phone').value.trim(),
                industry: document.getElementById('detail-industry').value
            };

            CMSConfig.setCustomers(mockCustomers);
            loadCustomers();
            closeCustomerDetailModal();
            alert('客户信息已更新。');
        });

        // 退出登录
        document.getElementById('logout-btn').addEventListener('click', function(e) {
            e.preventDefault();
            logout();
        });
        
        document.getElementById('user-menu-logout').addEventListener('click', function(e) {
            e.preventDefault();
            logout();
        });
        
        function logout() {
            localStorage.removeItem('userLogin');
            sessionStorage.removeItem('userLogin');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
