services:
  cms-web:
    image: ${APP_IMAGE}
    container_name: cms-web
    restart: unless-stopped
    ports:
      - "${APP_PORT}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3

  caddy:
    image: caddy:2.8-alpine
    container_name: cms-caddy
    restart: unless-stopped
    depends_on:
      - cms-web
    environment:
      DOMAIN: ${DOMAIN}
      TLS_EMAIL: ${TLS_EMAIL}
    ports:
      - "${HTTP_PORT}:80"
      - "${HTTPS_PORT}:443"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    profiles:
      - https

volumes:
  caddy_data:
  caddy_config:
