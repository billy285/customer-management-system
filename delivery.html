<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户管理系统 - 交付管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af',
                        secondary: '#3b82f6',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .sidebar-active { @apply bg-blue-50 text-primary border-r-4 border-primary; }
            .transition-all-300 { transition: all 0.3s ease; }
            .status-badge { @apply px-2 py-1 text-xs font-semibold rounded-full; }
            .status-pending { @apply bg-yellow-100 text-yellow-800; }
            .status-progress { @apply bg-blue-100 text-blue-800; }
            .status-review { @apply bg-purple-100 text-purple-800; }
            .status-completed { @apply bg-green-100 text-green-800; }
            .priority-high { @apply bg-red-100 text-red-800; }
            .priority-medium { @apply bg-orange-100 text-orange-800; }
            .priority-low { @apply bg-gray-100 text-gray-700; }
        }
    </style>
    <script src="app-config.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="min-h-screen flex">
        <aside id="sidebar" class="w-64 bg-white shadow-md z-20 md:block hidden">
            <div class="p-4 border-b">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white text-xl">
                        <i class="fa fa-users"></i>
                    </div>
                    <h1 class="ml-3 text-xl font-bold text-gray-800">客户管理系统</h1>
                </div>
            </div>
            <nav class="mt-4">
                <a href="dashboard.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300"><i class="fa fa-tachometer w-5"></i><span class="ml-3">仪表盘</span></a>
                <a href="customers.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300"><i class="fa fa-address-book w-5"></i><span class="ml-3">客户管理</span></a>
                <a href="sales.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300"><i class="fa fa-line-chart w-5"></i><span class="ml-3">销售管理</span></a>
                <a href="delivery.html" class="flex items-center px-4 py-3 text-gray-700 sidebar-active"><i class="fa fa-truck w-5"></i><span class="ml-3">交付管理</span></a>
                <a href="settings.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-gray-100 transition-all-300"><i class="fa fa-cog w-5"></i><span class="ml-3">系统设置</span></a>
            </nav>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm z-10">
                <div class="flex items-center justify-between p-4">
                    <div class="flex items-center">
                        <button id="sidebar-toggle" class="text-gray-500 focus:outline-none md:hidden"><i class="fa fa-bars text-xl"></i></button>
                        <div class="ml-2"><h2 class="text-xl font-semibold text-gray-800">交付管理</h2><p id="industry-delivery-label" class="text-xs text-gray-500"></p></div>
                    </div>
                    <div class="flex items-center">
                        <div class="relative">
                            <button id="user-menu-button" class="flex items-center text-gray-700 focus:outline-none">
                                <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center"><span id="user-initial">管</span></div>
                                <span class="ml-2 text-sm font-medium" id="user-name">管理员</span>
                                <i class="fa fa-chevron-down ml-1 text-xs"></i>
                            </button>
                            <div id="user-menu" class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 hidden">
                                <a href="#" id="user-menu-logout" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"><i class="fa fa-sign-out mr-2"></i> 退出登录</a>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 bg-gray-100">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-white rounded-lg shadow-sm p-4"><p class="text-sm text-gray-500">交付项目总数</p><p id="total-projects" class="text-2xl font-bold text-gray-800 mt-1">0</p></div>
                    <div class="bg-white rounded-lg shadow-sm p-4"><p class="text-sm text-gray-500">进行中</p><p id="in-progress-projects" class="text-2xl font-bold text-blue-700 mt-1">0</p></div>
                    <div class="bg-white rounded-lg shadow-sm p-4"><p class="text-sm text-gray-500">本月完成</p><p id="completed-projects" class="text-2xl font-bold text-green-700 mt-1">0</p></div>
                </div>

                <div class="bg-white rounded-lg shadow-sm p-4 mb-6">
                    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                        <div class="flex items-center gap-3">
                            <input id="search-input" type="text" placeholder="搜索客户 / 项目..." class="w-full md:w-72 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            <select id="status-filter" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                                <option value="">全部状态</option>
                                <option value="pending">待启动</option>
                                <option value="progress">进行中</option>
                                <option value="review">验收中</option>
                                <option value="completed">已完成</option>
                            </select>
                        </div>
                        <button id="add-delivery-btn" class="bg-primary hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-all-300"><i class="fa fa-plus mr-2"></i>新增交付项目</button>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">项目编号</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">客户</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">交付内容</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">负责人</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">优先级</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">截止日期</th>
                                </tr>
                            </thead>
                            <tbody id="delivery-table-body" class="bg-white divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="delivery-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold">新增交付项目</h3>
                <button id="close-modal-btn" class="text-gray-500"><i class="fa fa-times"></i></button>
            </div>
            <form id="delivery-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="project-customer" required placeholder="客户名称" class="border border-gray-300 rounded-md px-3 py-2">
                <input id="project-owner" required placeholder="负责人" class="border border-gray-300 rounded-md px-3 py-2">
                <input id="project-scope" required placeholder="交付内容（如：菜单设计+线上投放）" class="border border-gray-300 rounded-md px-3 py-2 md:col-span-2">
                <select id="project-priority" class="border border-gray-300 rounded-md px-3 py-2">
                    <option value="high">高</option><option value="medium" selected>中</option><option value="low">低</option>
                </select>
                <input id="project-deadline" required type="date" class="border border-gray-300 rounded-md px-3 py-2">
                <div class="md:col-span-2 flex justify-end gap-2 mt-2">
                    <button type="button" id="cancel-modal-btn" class="px-4 py-2 border border-gray-300 rounded-md">取消</button>
                    <button type="submit" class="px-4 py-2 bg-primary text-white rounded-md">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let mockDeliveries = CMSConfig.getDeliveries();
        if (!mockDeliveries.length) {
            CMSConfig.ensureDemoData();
            mockDeliveries = CMSConfig.getDeliveries();
        }

        const statusMap = { pending: '待启动', progress: '进行中', review: '验收中', completed: '已完成' };
        const priorityMap = { high: '高', medium: '中', low: '低' };

        function loadDeliveries() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            const status = document.getElementById('status-filter').value;
            const rows = mockDeliveries.filter((item) => {
                const hitKeyword = !keyword || item.customer.toLowerCase().includes(keyword) || item.scope.toLowerCase().includes(keyword) || item.id.toLowerCase().includes(keyword);
                const hitStatus = !status || item.status === status;
                return hitKeyword && hitStatus;
            });

            const tableBody = document.getElementById('delivery-table-body');
            tableBody.innerHTML = '';
            rows.forEach((item) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm text-gray-900">${item.id}</td>
                    <td class="px-6 py-4 text-sm text-gray-900 font-medium">${item.customer}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${item.scope}</td>
                    <td class="px-6 py-4 text-sm text-gray-900">${item.owner}</td>
                    <td class="px-6 py-4"><span class="status-badge priority-${item.priority}">${priorityMap[item.priority]}</span></td>
                    <td class="px-6 py-4"><span class="status-badge status-${item.status}">${statusMap[item.status]}</span></td>
                    <td class="px-6 py-4 text-sm text-gray-500">${item.dueDate}</td>
                `;
                tableBody.appendChild(tr);
            });

            document.getElementById('total-projects').textContent = mockDeliveries.length;
            document.getElementById('in-progress-projects').textContent = mockDeliveries.filter((x) => x.status === 'progress').length;
            document.getElementById('completed-projects').textContent = mockDeliveries.filter((x) => x.status === 'completed').length;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const savedLogin = localStorage.getItem('userLogin') || sessionStorage.getItem('userLogin');
            if (!savedLogin) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const userData = JSON.parse(savedLogin);
                document.getElementById('user-name').textContent = userData.name;
                document.getElementById('user-initial').textContent = userData.name.charAt(0);
                const profile = CMSConfig.getActiveProfile();
                document.getElementById('industry-delivery-label').textContent = `${profile.label}行业交付看板`;
                CMSConfig.ensureDemoData();
                mockDeliveries = CMSConfig.getDeliveries();
                loadDeliveries();
            } catch (e) {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('sidebar-toggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('hidden');
        });

        document.getElementById('user-menu-button').addEventListener('click', function() {
            document.getElementById('user-menu').classList.toggle('hidden');
        });

        document.addEventListener('click', function(event) {
            const userMenu = document.getElementById('user-menu');
            const userMenuButton = document.getElementById('user-menu-button');
            if (!userMenuButton.contains(event.target) && !userMenu.contains(event.target)) {
                userMenu.classList.add('hidden');
            }
        });

        document.getElementById('search-input').addEventListener('input', loadDeliveries);
        document.getElementById('status-filter').addEventListener('change', loadDeliveries);

        function openModal() { document.getElementById('delivery-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('delivery-modal').classList.add('hidden'); }

        document.getElementById('add-delivery-btn').addEventListener('click', openModal);
        document.getElementById('close-modal-btn').addEventListener('click', closeModal);
        document.getElementById('cancel-modal-btn').addEventListener('click', closeModal);
        document.getElementById('delivery-modal').addEventListener('click', function(event) { if (event.target === this) closeModal(); });

        document.getElementById('delivery-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const nextNumber = mockDeliveries.length + 1;
            mockDeliveries.unshift({
                id: `D2026${String(nextNumber).padStart(3, '0')}`,
                customer: document.getElementById('project-customer').value.trim(),
                owner: document.getElementById('project-owner').value.trim(),
                scope: document.getElementById('project-scope').value.trim(),
                priority: document.getElementById('project-priority').value,
                status: 'pending',
                dueDate: document.getElementById('project-deadline').value
            });
            CMSConfig.setDeliveries(mockDeliveries);
            closeModal();
            this.reset();
            loadDeliveries();
            alert('交付项目已创建。');
        });

        document.getElementById('user-menu-logout').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('userLogin');
            sessionStorage.removeItem('userLogin');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
